name: Cleanup History

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Squash all history into single commit
        run: |
          git checkout --orphan fresh
          git add -A
          git commit -m "data snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git branch -M fresh master
          git push --force origin master
